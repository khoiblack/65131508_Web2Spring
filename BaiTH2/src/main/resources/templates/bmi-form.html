<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tính chỉ số BMI</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #e0f7fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #00bcd4; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px;}
        button:hover { background: #0097a7; }
        label { display: block; text-align: left; font-weight: bold; color: #555; margin-top: 10px;}
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: #0097a7;">Kiểm Tra BMI</h2>
        <form action="/tinh-bmi" method="POST">
            <label>Chiều cao (m):</label>
            <input type="number" step="0.01" name="chieucao" required placeholder="Ví dụ: 1.75">
            
            <label>Cân nặng (kg):</label>
            <input type="number" step="0.1" name="cannang" required placeholder="Ví dụ: 65">
            
            <button type="submit">Tính Toán</button>
        </form>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách Sản Phẩm</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f8f9fa;}
        h2 { color: #005088; text-align: center; }
        table { width: 80%; border-collapse: collapse; margin: 20px auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); background-color: white;}
        th, td { border: 1px solid #ddd; padding: 12px 15px; text-align: center; }
        th { background-color: #005088; color: white; text-transform: uppercase; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        tr:hover { background-color: #e2e8f0; } 
        .price { color: #d93025; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Danh sách Sản Phẩm Hiện Có</h2>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Mã SP</th>
                <th>Tên Sản Phẩm</th>
                <th>Số Lượng</th>
                <th>Giá Bán</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="sp, iterStat : ${dsSanPham}">
                
                <td th:text="${iterStat.count}"></td>
                
                <td th:text="${sp.maSP}"></td>
                <td th:text="${sp.tenSP}"></td>
                <td th:text="${sp.soLuong}"></td>
                
                <td class="price" th:text="${#numbers.formatDecimal(sp.gia, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                
            </tr>
        </tbody>
    </table>

</body>
</html>

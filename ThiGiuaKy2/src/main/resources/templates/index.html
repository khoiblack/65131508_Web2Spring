<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang Tin Tức Tổng Hợp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">📰 BÁO MỚI 24H</a>
            
            <div class="d-flex">
                <a th:if="${session.USER == null}" href="/login" class="btn btn-light btn-sm fw-bold">Đăng nhập</a>
                <div th:if="${session.USER != null}">
                    <span class="text-white me-3">Chào, <b th:text="${session.USER}"></b>!</span>
                    <a href="/logout" class="btn btn-danger btn-sm">Đăng xuất</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-3 mb-4">
                <div class="list-group shadow-sm">
                    <a th:href="@{/}" class="list-group-item list-group-item-action fw-bold text-primary">
                        Tất cả tin tức
                    </a>
                    <a th:each="tl : ${dsTheLoai}" 
                       th:href="@{/theloai/{id}(id=${tl.id})}" 
                       th:text="${tl.tenTheLoai}"
                       class="list-group-item list-group-item-action">
                    </a>
                </div>
            </div>

            <div class="col-md-9">
                <div class="row g-3">
                    <div class="col-md-6" th:each="tin : ${dsTin}">
                        <div class="card h-100 shadow-sm border-0">
                            <div class="card-body">
                                <span class="badge bg-secondary mb-2" th:text="${tin.theLoaiTin.tenTheLoai}">Thể loại</span>
                                <h5 class="card-title fw-bold" th:text="${tin.tieuDe}">Tiêu đề tin</h5>
                                <p class="card-text text-muted text-truncate" th:text="${tin.noiDung}">Nội dung tóm tắt...</p>
                            </div>
                            <div class="card-footer bg-white border-0 text-end">
                                <a th:href="@{/tin/{id}(id=${tin.id})}" class="btn btn-outline-primary btn-sm">Đọc tiếp &rarr;</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>

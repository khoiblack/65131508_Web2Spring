<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập Quản Trị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                
                <div class="card shadow-lg border-0 rounded-3">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0 fw-bold">ĐĂNG NHẬP</h4>
                    </div>
                    
                    <div class="card-body p-4">
                        <div th:if="${error}" class="alert alert-danger py-2 text-center" th:text="${error}"></div>
                        
                        <form action="/login" method="POST">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên đăng nhập</label>
                                <input type="text" name="username" class="form-control" required placeholder="Nhập admin">
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold">Mật khẩu</label>
                                <input type="password" name="password" class="form-control" required placeholder="Nhập 123456">
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 fw-bold">Đăng nhập hệ thống</button>
                        </form>
                    </div>
                    
                    <div class="card-footer text-center bg-white border-0 pb-3">
                        <a href="/" class="text-decoration-none text-muted">&larr; Quay lại trang chủ</a>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>

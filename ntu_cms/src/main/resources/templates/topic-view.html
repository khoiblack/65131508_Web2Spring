<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chi tiết Topic</title>
    <th:block th:replace="~{fragments :: head_css}"></th:block>
    
    <style>
        .detail-table { width: 100%; max-width: 600px; border-collapse: collapse; margin-top: 20px; }
        .detail-table th, .detail-table td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        .detail-table th { background-color: #f2f2f2; width: 30%; }
        .btn-back { display: inline-block; background-color: #34495e; color: white; padding: 8px 15px; text-decoration: none; font-weight: bold; margin-top: 20px; border-radius: 4px; }
        .btn-back:hover { background-color: #2c3e50; }
    </style>
</head>
<body>

    <div th:replace="~{fragments :: header_fragment}"></div>

    <div class="main-wrapper">
        
        <div th:replace="~{fragments :: sidebar_fragment}"></div>

        <main class="content">
            <h2>Chi tiết Đề tài (Topic)</h2>
            
            <table class="detail-table">
                <tr>
                    <th>ID Đề tài:</th>
                    <td th:text="${topic.id}"></td>
                </tr>
                <tr>
                    <th>Tên Đề tài:</th>
                    <td style="font-weight: bold; color: #d32f2f;" th:text="${topic.topicName}"></td>
                </tr>
                <tr>
                    <th>Mã GV Hướng dẫn:</th>
                    <td th:text="${topic.supervisorId}"></td>
                </tr>
                <tr>
                    <th>Phân loại:</th>
                    <td th:text="${topic.topicType}"></td>
                </tr>
                <tr>
                    <th>Mô tả chi tiết:</th>
                    <td th:text="${topic.topicDescription}"></td>
                </tr>
            </table>

            <a th:href="@{/topic/all}" class="btn-back">⬅ Quay lại danh sách</a>
        </main>

    </div>

    <div th:replace="~{fragments :: footer_fragment}"></div>

</body>
</html>

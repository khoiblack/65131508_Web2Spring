<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Tin Tức</title>
</head>
<body style="font-family: Arial; padding: 20px;">
    <h2>QUẢN LÝ TIN TỨC (ADMIN)</h2>
    <a th:href="@{/admin/tintuc/them}" style="padding: 10px; background: green; color: white; text-decoration: none;">+ Thêm bài viết mới</a>
    <br><br>
    
    <table border="1" style="width: 100%; border-collapse: collapse; text-align: left;">
        <tr style="background-color: #f2f2f2;">
            <th>ID</th>
            <th>Tiêu đề</th>
            <th>Loại tin</th>
            <th>Hành động</th>
        </tr>
        <tr th:each="tin : ${dsTinTuc}">
            <td th:text="${tin.id}">1</td>
            <td th:text="${tin.tieuDe}">Tiêu đề</td>
            <td th:text="${tin.loaiTin.tenLoai}">Loại tin</td>
            <td>
                <a th:href="@{/admin/tintuc/sua/{id}(id=${tin.id})}" style="color: blue;">Sửa</a> | 
                <a th:href="@{/admin/tintuc/xoa/{id}(id=${tin.id})}" style="color: red;" onclick="return confirm('Bạn có chắc muốn xóa bài này?');">Xóa</a>
            </td>
        </tr>
    </table>
</body>
</html>
